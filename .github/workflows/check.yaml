# This workflow runs for every pull request to lint and test the proposed changes.

name: Check

on:
    pull_request:
    workflow_call:
        inputs:
            bun_e2e_mode:
                description: 'Bun e2e suite scope: `compatible` (curated subset known to pass) or `full` (entire suite).'
                type: string
                default: compatible
                required: false
    workflow_dispatch:
        inputs:
            bun_e2e_mode:
                description: 'Bun e2e suite scope'
                type: choice
                options:
                    - compatible
                    - full
                default: compatible
                required: true

jobs:
    lint:
        name: Lint
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install Dependencies
              run: npm install

            - name: Lint code
              run: npm run lint

    unit:
        name: Unit tests (Node.js ${{ matrix.node-version }})
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        runs-on: ubuntu-24.04

        strategy:
            fail-fast: false
            matrix:
                node-version: [20, 22, 24]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install Dependencies
              run: npm install

            - name: Run unit tests
              run: npm run test:unit

    e2e:
        name: E2E tests (Node.js 24)
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install Dependencies
              run: npm install

            - name: Add localhost-test to Linux hosts file
              run: sudo echo "127.0.0.1 localhost-test" | sudo tee -a /etc/hosts

            - name: Run E2E tests
              run: npm run test:e2e

    bun_unit:
        name: Unit tests (Bun)
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        runs-on: ubuntu-24.04
        timeout-minutes: 15

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install Dependencies
              run: npm install

            - name: Run unit tests with Bun
              run: npm run test:bun

    bun_e2e:
        name: E2E tests (Bun, ${{ inputs.bun_e2e_mode || 'compatible' }})
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        runs-on: ubuntu-24.04
        timeout-minutes: 30

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install Dependencies
              run: npm install

            - name: Add localhost-test to Linux hosts file
              run: sudo echo "127.0.0.1 localhost-test" | sudo tee -a /etc/hosts

            - name: Run E2E tests (Bun, ${{ inputs.bun_e2e_mode || 'compatible' }})
              run: npm run test:bun:e2e:${{ inputs.bun_e2e_mode || 'compatible' }}
